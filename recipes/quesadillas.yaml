title: "Pulled pork quesadillas"
prep_time: "10 minutes"
cook_time: "1 hour, 10 minutes"
servings: "3 (6 quesadillas)"
ingredients:
  Pulled Pork:
    - 700g pork scotch fillet
    - 1 tsp salt
    - 1 tsp smoked paprika
    - 1 tsp cumin
    - 1 tsp garlic powder (or 2 cloves garlic, minced)
    - 1 tbsp brown sugar
    - 1 onion, sliced
    - 1 cup stock (chicken or vegetable)
    - 1/2 cup BBQ sauce
    - 1 tbsp worcestershire sauce
    - 1 tbsp apple cider vinegar
  Quesadillas:
    - 12 small flour tortillas (taco size)
    - 6 cheese slices (or 1 1/2 cups shredded cheese)
    - 400g pulled pork (or chicken or beef)
    - 1 avocado, sliced
    - 2 tomatoes, sliced
    - sour cream to serve
instructions:
  Pulled Pork:
    - Cut pork into 3-4 large chunks.
    - Mix salt, spices, and sugar, and rub all over the pork.
    - Sear pork in pressure cooker on saute mode until brown on all sides.
    - Add onion, stock, BBQ sauce, worcestershire sauce and vinegar. Mix well.
    - Cook on high pressure for 40 minutes, then allow to naturally release for 10 minutes.
    - Remove pork and shred with forks. Then turn saute mode back on and reduce liquid for 5-10 minutes.
    - Stir shredded pork back through.
  Quesadillas:
    - Heat up toasted sandwich press.
    - Place first tortilla on sandwich press, top with pulled pork, then cheese. Add second tortilla on top, and cook until golden.
    - Repeat with remaining tortillas and filling.
    - Meanwhile slice avocado and tomatoes, and serve with sour cream on the side.
notes:
  - We use the sandwich press as it's quick and easy, but you can also do this in the oven or a frying pan.
  - Use bigger tortillas if you can fit them!
  - Other fillings like pineapple, ham, tomatoes, or mushrooms also work well.
  - Freeze leftover pulled pork for use in other meals.
commentary: "A simple dish which the kids like to eat, although they mostly just like the tortillas!"
