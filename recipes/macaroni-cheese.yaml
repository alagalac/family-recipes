title: "Baked Mac and Cheese"
prep_time: "10 minutes"
cook_time: "40 minutes"
serves: "6-8"
ingredients:
  - 400g macaroni pasta (or similar)
  - 2 tbsp butter
  - 2 tbsp plain flour
  - 2 cups milk
  - 2 cups shredded cheese (any type really, but tasty and mozzarella is good)
  - 2/3 cup panko breadcrumbs
instructions:
  - Preheat over to 180°C.
  - Cook pasta according to packet instructions. Don't over-cook, and drain well.
  - In a saucepan, melt butter. Add flour and cook for 1 minute.
  - Gradually add milk, whisking to avoid lumps. Cook until thickened.
  - Remove from heat and stir in cheese until melted.
  - Combine cooked pasta with cheese sauce, transfer to a baking dish, top with breadcrumbs and any extra cheese and bake for 20 minutes or until golden and bubbly.
notes:
  - You can add vegetables such as cooked cauliflower, peas, or carrots to at least have some vegetables.
attribution: ""
commentary: "A great comfort food for a cold winter evening. This has been a hit with the kids."
