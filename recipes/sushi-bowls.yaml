title: "Sushi Bowls"
prep_time: "15 minutes"
cook_time: "5 minutes"
servings: "4"
ingredients:
  - 2 cups cooked sushi rice
  - 1 avocado, sliced
  - 1 cucumber, julienned
  - 1 carrot, julienned
  - 100g hot smoked salmon, flaked
  - 100g edamame beans, cooked and shelled
  - 4 sheets nori, cut into strips
  - 1 packet sushi seasoning
  - Kewpie mayo
instructions:
- In a bowl, mix the cooked sushi rice with sushi seasoning to taste.
- Divide the seasoned rice into 4 bowls.
- Top each bowl with avocado slices, cucumber, carrot, smoked salmon, edamame beans, and nori strips.
- Drizzle with Kewpie mayo and serve immediately.
notes:
  - You can make your own sushi seasoning, but I've never had much luck with it.
commentary: "Quicker and easier than making sushi, and better for fussy eaters! The girls mostly eat just the sushi rice anyway."
