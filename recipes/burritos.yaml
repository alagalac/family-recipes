title: "Burritos"
prep_time: "20 mins"
cook_time: "20 mins"
servings: "6"
ingredients:
  - 400g beef mince
  - 1 onion, diced
  - 1 can crushed tomatoes
  - 1 can kidney beans, drained and rinsed
  - 2 cloves garlic, minced
  - 1 tsp cumin
  - 1 tsp paprika
  - 3 tomatoes, diced
  - 1/2 iceberg lettuce, shredded
  - 1 cup grated cheese
  - sour cream, to serve
  - avocado, sliced, if you have them!
  - 6 jumbo flour tortillas
instructions:
  - Heat frying pan and add onion and garlic. Cook until softened.
  - Add beef mince and cook until browned. chop in pan with flat edged wooden spoon to break up the mince.
  - Add crushed tomatoes, kidney beans, cumin and paprika. Simmer for 10-15 minutes until thickened.
  - Warm the tortillas in the microwave
  - To assemble, put some lettuce in middle of each tortilla, then add beef mixture, tomato, cheese, sour cream and avocado. Roll up and serve!
notes:
  - Instead of the can of kidney beans and spices, you can just use a can of mild chilli beans. We prefer the Watties brand.
  - Mesculine mix also works well instead of the iceberg lettuce.
  - Add some chipotle sauce for a bit of heat.
commentary: "A simple classic. The kids really like tortillas."
