title: "Toad in the Hole"
prep_time: "15 mins"
cook_time: "50 mins"
servings: "4"
ingredients:
  - 30 ml vegetable oil
  - 450g sausages
  - 125g plain flour
  - pinch of salt
  - 1 egg
  - 300 ml milk and water mixed
instructions:
  - Put the vegetable oil in a small roasting tin and add the sausages. Place the tin in the oven at 220°C for about 10 minutes, until browned and the fat is hot.
  - Meanwhile, sift the flour and salt into a bowl and make a well in the centre. Add the egg and half the liquid.
  - Gradually mix the flour into the centre of the bowl and add the remaining liquid. Beat until smooth.
  - Pour into the roasting tin and bake in the oven for 40-45 minutes, until the batter is well risen and golden.
notes:
  - 
commentary: "This was a classic British dish from my childhood (and I assume Nan's childhood too)."
attribution: "Good Housekeeping"
