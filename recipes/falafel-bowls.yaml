title: "Falafel Bowls"
prep_time: "15 minutes"
cook_time: "20 minutes"
servings: "4"
ingredients:
  - 300g falafel mix (or pre-made falafel)
  - 1 cucumber, diced
  - 2 tomatoes, diced
  - 1 1/2 cup cooked rice or pearl couscous
  - 1 avocado, sliced
  - 1/2 cup hummus
  - 1/4 cup tahini sauce
  - 1/4 cup chopped parsley
instructions:
  - Prepare falafel according to package instructions (or make your own from scratch if you have a recipe you like).
  - While the falafel is cooking, prepare the rice or couscous according to package instructions.
  - In a bowl, combine diced cucumber, tomatoes, and parsley. Season with salt and pepper to taste.
  - To assemble the bowls, divide the cooked rice or couscous between 4 bowls. Top each bowl with falafel, the cucumber and tomato mixture, avocado slices, a dollop of hummus, and a drizzle of tahini sauce.
  - Serve immediately and enjoy!
notes:
  - Often I just use greek yohurt mixed with a bit of lemon juice and garlic instead of tahini sauce.
  - This goes well served in flatbreads too.
commentary: "Another flexibel bowl recipe!"
